services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-use-diego}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  indexer:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-use-diego}
      DATABASE_SCHEMA: public
      PONDER_RPC_URL_421614: ${PONDER_RPC_URL_421614}
      PONDER_RPC_URL_84532: ${PONDER_RPC_URL_84532}
    ports:
      - "42069:42069"

volumes:
  postgres_data:
